name: 'publish'
on:
  push:
    tags:
      - 'v*'
  workflow_dispatch:
    inputs:
      tag_name:
        description: 'Tag name for the release (e.g. v0.2.0)'
        required: true
        type: string

jobs:
  publish-tauri:
    permissions:
      contents: write
    strategy:
      fail-fast: false
      matrix:
        include:
          - platform: 'macos-latest'
            args: '--target aarch64-apple-darwin'
          - platform: 'macos-latest'
            args: '--target x86_64-apple-darwin'
          - platform: 'ubuntu-22.04'
            args: ''
          - platform: 'windows-latest'
            args: ''
    runs-on: ${{ matrix.platform }}
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}
      - uses: Swatinem/rust-cache@v2
      - name: install dependencies (ubuntu only)
        if: matrix.platform == 'ubuntu-22.04'
        run: |
          sudo apt-get update
          sudo apt-get install -y libwebkit2gtk-4.1-dev libappindicator3-dev librsvg2-dev patchelf
      - name: install frontend dependencies
        run: npm ci
      - uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        with:
          uploadPlainBinary: true
          tagName: ${{ github.event.inputs.tag_name || github.ref_name }}
          releaseName: 'Urayomi ${{ github.event.inputs.tag_name || github.ref_name }}'
          releaseBody: |
            ##  Download Info
            Select the installer or portable for your platform below.
            ##  Changelog
            Check the automated notes below for a list of all changes in this version.
          releaseDraft: false
          prerelease: false
          generateReleaseNotes: true
          args: ${{ matrix.args }}

  publish-android:
    permissions:
      contents: write
    runs-on: ubuntu-22.04
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install Android targets
        run: rustup target add aarch64-linux-android armv7-linux-androideabi i686-linux-android x86_64-linux-android
      - name: setup Java
        uses: actions/setup-java@v4
        with:
          distribution: 'temurin'
          java-version: '17'
      - name: setup Android SDK
        uses: android-actions/setup-android@v3
      - name: install NDK
        run: sdkmanager "ndk;27.0.12077973"
      - name: install frontend dependencies
        run: npm ci
      - name: init Android project
        run: npm run tauri android init
      - name: build Android APK
        env:
          NDK_HOME: ${{ env.ANDROID_HOME }}/ndk/27.0.12077973
        run: npm run tauri android build -- --apk
      - name: upload Android APK to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: src-tauri/gen/android/app/build/outputs/apk/universal/release/*.apk
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}

  publish-ios:
    permissions:
      contents: write
    runs-on: macos-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0
      - name: setup node
        uses: actions/setup-node@v4
        with:
          node-version: lts/*
          cache: 'npm'
      - name: install Rust stable
        uses: dtolnay/rust-toolchain@stable
      - uses: Swatinem/rust-cache@v2
      - name: install iOS targets
        run: rustup target add aarch64-apple-ios x86_64-apple-ios aarch64-apple-ios-sim
      - name: install frontend dependencies
        run: npm ci
      - name: create xcodebuild wrapper
        run: |
          mkdir -p "$HOME/.bin"
          cat > "$HOME/.bin/xcodebuild" << 'EOF'
          #!/bin/bash
          # Skip the exportArchive step entirely - we package manually
          for arg in "$@"; do
            if [[ "$arg" == "-exportArchive" ]]; then
              echo "Skipping exportArchive - will package manually"
              exit 0
            fi
          done
          ARGS=()
          for arg in "$@"; do
            if [[ "$arg" != "-allowProvisioningUpdates" ]]; then
              ARGS+=("$arg")
            fi
          done
          ARGS+=(
            "CODE_SIGNING_ALLOWED=NO"
            "CODE_SIGNING_REQUIRED=NO"
            "CODE_SIGN_IDENTITY="
            "DEVELOPMENT_TEAM=XXXXXXXXXX"
          )
          exec /Applications/Xcode_16.4.app/Contents/Developer/usr/bin/xcodebuild "${ARGS[@]}"
          EOF
          chmod +x "$HOME/.bin/xcodebuild"
          echo "$HOME/.bin" >> $GITHUB_PATH
      - name: init iOS project
        run: npm run tauri ios init
        env:
          APPLE_DEVELOPMENT_TEAM: XXXXXXXXXX
      - name: build iOS app
        run: npm run tauri ios build -- --export-method debugging
        env:
          APPLE_DEVELOPMENT_TEAM: XXXXXXXXXX
      - name: package IPA manually
        run: |
          APP_PATH=$(find ~/Library/Developer/Xcode/DerivedData -name "lnreader.app" -path "*/Build/Products/release-iphoneos/*" | head -1)
          echo "Found app at: $APP_PATH"
          mkdir -p Payload
          cp -r "$APP_PATH" Payload/
          zip -r Urayomi.ipa Payload
          ls -la Urayomi.ipa
      - name: upload iOS IPA to release
        uses: softprops/action-gh-release@v2
        with:
          tag_name: ${{ github.event.inputs.tag_name || github.ref_name }}
          files: Urayomi.ipa
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
